# IMUHOI Mamba-simple training config
# Three-stage pipeline is kept identical to model/rnn, while every temporal
# backbone is replaced by standard mamba_ssm.Mamba-based modules.

# ============ 基本配置 ============
save_dir: "outputs/IMUHOI_MambaSimple"
body_model_path: datasets/smpl_models/smplh/male/model.npz
use_tensorboard: true
use_multi_gpu: true
device: "cuda:0"
gpus: [0]
model_arch: "mamba_simple"

# ============ Mamba-simple 骨干配置 ============
mamba_simple:
  d_state: 16
  d_conv: 4
  expand: 2
  ff_mult: 2.0
  init_prefix_len: 4
  use_film: true

# ============ Stage 1: HumanPose ============
human_pose_hidden: 256
human_pose_layers: 3
human_pose_dropout: 0.1

# ============ Stage 2: VelocityContact ============
velocity_hidden_dim: 192
velocity_num_layers: 3
velocity_dropout: 0.1
boundary_group_hidden: 96
boundary_hidden_dim: 192
boundary_mamba_layers: 2

# ============ Stage 3: ObjectTrans ============
hidden_dim_multiplier: 2
gating_prior_beta: 5.0
gating_temperature: 5.0
gating_smoothing_enabled: false
gating_smoothing_alpha: 0.6
gating_max_change: 0.25
vel_static_threshold: 0.3
vel_min_hand_speed: 0.02

# ============ 训练超参数 ============
epochs: 500
batch_size: 64
lr: 0.00015
weight_decay: 0.00001
milestones: [100, 200, 300, 400]
gamma: 0.2
seed: 42
num_workers: 12

# ============ 特征维度 ============
num_human_imus: 6
imu_dim: 9
obj_imu_dim: 9
num_joints: 24

# ============ 噪声配置 ============
imu_acc_noise_std: 0.3
imu_rot_noise_std: 0.3
obj_imu_acc_noise_std: 0.3
obj_imu_rot_noise_std: 0.3

# ============ 要使用的数据集 ============
train_datasets: ["omomo"]  # 可选: behave, imhd, omomo, amass

# ============ 数据集路径 ============
datasets:
  amass:
    train_path: "process/processed_amass_data_0703/train"
    test_path: "process/processed_amass_data_0703/test"
    debug_path: "process/processed_amass_data_0703/debug"
  omomo:
    train_path: "process/processed_split_data_OMOMO_bps/train"
    test_path: "process/processed_split_data_OMOMO_bps/test"
    debug_path: "process/processed_split_data_OMOMO_bps/debug"
  imhd:
    train_path: "process/processed_seg_data_IMHD/train"
    test_path: "process/processed_seg_data_IMHD/test"
    debug_path: "process/processed_seg_data_IMHD/debug"
  behave:
    train_path: "process/processed_seg_data_BEHAVE/train"
    test_path: "process/processed_seg_data_BEHAVE/test"
    debug_path: "process/processed_seg_data_BEHAVE/debug"

# ============ 损失权重 ============
loss_weights:
  # Stage 1: HumanPoseModule
  vel_root: 1.0
  pose_reduced: 10.0
  root_vel_local: 1.0
  root_vel: 1.0
  root_trans: 1.0
  hand_pos: 1.0
  contact: 1.0

  # Stage 2: VelocityContactModule
  obj_vel: 1.0
  hand_vel: 1.0
  obj_move: 1.0
  hand_contact_cond: 1.0
  interaction_boundary: 0.1
  interaction_order: 1.0
  boundary_focal_alpha: 0.25
  boundary_focal_gamma: 2.0

  # Stage 3: ObjectTransModule
  obj_trans: 1.0
  lhand_obj_direction: 0.1
  rhand_obj_direction: 0.1
  lhand_lb: 0.1
  rhand_lb: 0.1
  hoi_error_l: 0.2
  hoi_error_r: 0.2
  obj_vel_cons: 0.1
  obj_acc_cons: 0.01

# ============ 窗口配置 ============
train:
  window: 120

test:
  window: 120

# ============ 预训练模块路径（可选）============
pretrained_modules: 
  human_pose: "outputs/IMUHOI_MambaSimple/human_pose_05080123/best.pt"
  velocity_contact: null
  object_trans: null
