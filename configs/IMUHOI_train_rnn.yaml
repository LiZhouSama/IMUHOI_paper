# IMUHOI 统一训练配置文件
# 通过命令行 --no_trans 参数切换模式

# ============ 基本配置 ============
save_dir: "outputs/IMUHOI_DiT"
body_model_path: datasets/smpl_models/smplh/male/model.npz
use_tensorboard: True
use_multi_gpu: True
device: "cuda:0"
gpus: [0]
model_arch: "rnn"  # 可选: rnn, dit

# ============ DiT超参数(仅在model_arch=dit时使用) ============
dit:
  dit_d_model: 256
  dit_nhead: 8
  dit_num_layers: 6
  dit_dim_feedforward: 1024
  dit_dropout: 0.1
  dit_timesteps: 1000
  dit_use_time_embed: true
  dit_use_noise: true
  dit_prediction_type: "x0"
  dit_max_seq_len: 256
  dit_inference_steps: 20
  dit_inference_sampler: "ddim"
  dit_inference_eta: 0.0
  dit_enable_root_correction: true
  dit_root_contact_vel_threshold: 0.15
  formulation: "residual"

# ============ 交互模块训练配置 ============
interaction_training:
  freeze_ratio: 0.8
  joint_phase_lr_factor: 0.2
  hp_aux_weight: 0.0
  hp_train_sample_steps: 20
  hp_train_sampler: "ddim"
  hp_train_eta: 0.0

# ============ 交互模块结构配置 ============
interaction:
  head_mode: "split"

# ============ 评估与EMA ============
ema_decay: 0.999
eval_ddim_steps: 10
eval_sampler: "ddim"
eval_eta: 0.0

# ============ 全局常量 ============
FRAME_RATE: 30
SENSOR_POS_INDICES: [0, 7, 8, 15, 20, 21]
SENSOR_ROT_INDICES: [0, 4, 5, 15, 18, 19]
VEL_SELECTION_INDICES: [0, 7, 8, 15, 20, 21]
REDUCED_INDICES: [1, 2, 3, 6, 9, 12, 13, 14, 16, 17]
IGNORED_INDICES: [7, 8, 10, 11, 20, 21, 22, 23]
SENSOR_NAMES: ['Root', 'LeftLowerLeg', 'RightLowerLeg', 'Head', 'LeftForeArm', 'RightForeArm']
SENSOR_VEL_NAMES: ['Root', 'LeftFoot', 'RightFoot', 'Head', 'LeftHand', 'RightHand']
REDUCED_POSE_NAMES: ['LeftHip', 'RightHip', 'Spine1', 'Spine2', 'Spine3', 'Neck', 
                     'LeftCollar', 'RightCollar', 'LeftShoulder', 'RightShoulder']

# ============ 训练超参数 ============
epoch: 300
batch_size: 120
lr: 0.0002
weight_decay: 0.00001
milestones: [100, 200]
gamma: 0.2
seed: 42
num_workers: 12

# ============ 特征维度 ============
num_human_imus: 6
imu_dim: 9
num_joints: 24
joint_dim: 6
vel_scale: 3

# ============ 噪声配置 ============
imu_noise_std: 0.3
obj_imu_noise_std: 0.3

# ============ 物体参数 ============
obj_imu_change_threshold: 0.1
obj_contact_threshold: 0.3
obj_rot_weight: 0.5
hand_contact_distance: 0.1

# ============ 要使用的数据集 ============
# 修改此项来选择训练数据
train_datasets: ["omomo"]  # 可选: behave, imhd, omomo, amass

# ============ 数据集路径 ============
datasets:
  amass:
    train_path: "process/processed_amass_data_0703/train"
    test_path: "process/processed_amass_data_0703/test"
    debug_path: "process/processed_amass_data_0703/debug"
  omomo:
    train_path: "process/processed_split_data_OMOMO/train"
    test_path: "process/processed_split_data_OMOMO/test"
    debug_path: "process/processed_split_data_OMOMO/debug"
  imhd:
    train_path: "process/processed_seg_data_IMHD/train"
    test_path: "process/processed_seg_data_IMHD/test"
    debug_path: "process/processed_seg_data_IMHD/debug"
  behave:
    train_path: "process/processed_seg_data_BEHAVE/train"
    test_path: "process/processed_seg_data_BEHAVE/test"
    debug_path: "process/processed_seg_data_BEHAVE/debug"

# ============ 损失权重 ============
loss_weights:
  # Stage 1: HumanPose
  simple_vel: 1.0
  simple_pose: 10.0
  simple_root_vel_local: 1.0
  simple_root_vel: 1.0
  simple_root_trans: 1.0
  vel_smooth: 0.5
  fk_joint: 1.0
  drift: 10
  foot_slide: 1
  diffusion_x0: 1.0
  hand_pos: 1.0
  
  # Interaction (merged VC + OT)
  interaction_boundary: 0.1
  interaction_order: 1.0
  obj_trans: 1.0
  contact_logits: 1.0
  geometry_dir_l: 0.1
  geometry_dir_r: 0.1
  geometry_len_l: 0.1
  geometry_len_r: 0.1
  hoi_error_l: 0.2
  hoi_error_r: 0.2
  obj_vel_cons: 0.1
  obj_acc_cons: 0.01
  diffusion_eps: 1.0

# ============ 窗口配置 ============
train:
  window: 60

test:
  window: 60

# ============ 预训练模块路径（可选）============
# 取消注释以使用预训练权重
pretrained_modules:
  human_pose: "outputs/IMUHOI/joint_train_01112057/best_human_pose.pt"
  velocity_contact: "outputs/IMUHOI/joint_train_01112057/best_velocity_contact.pt"
  object_trans: "outputs/IMUHOI/joint_train_01112057/best_object_trans.pt"
