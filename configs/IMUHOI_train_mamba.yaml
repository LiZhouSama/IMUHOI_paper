# IMUHOI Mamba training config
# Stage 1: HumanPoseModule, Stage 2: InteractionModule

# ============ 基本配置 ============
save_dir: "outputs/IMUHOI_Mamba"
body_model_path: datasets/smpl_models/smplh/male/model.npz
use_tensorboard: true
use_multi_gpu: true
device: "cuda:0"
gpus: [0]
model_arch: "mamba"

# ============ Mamba 模型超参数 ============
mamba:
  hidden_dim: 256
  part_hidden_dim: 256
  fast_layers: 3
  slow_layers: 3
  fast_kernel: 3
  slow_kernel: 9
  slow_dilation: 2
  slow_ma_window: 5
  memory_heads: 4
  memory_size: 8
  dropout: 0.1
  use_delta_features: false
  contact_fusion_enabled: true
  contact_fusion_min_prob: 0.6
  contact_fusion_full_prob: 0.95
  contact_fusion_max_speed: 2.0
  prevent_floor_penetration: true
  floor_height: 0.0
  interaction:
    # 评估/可视化时设为 true 可强制加载 Mamba 全 pipeline；
    # 更常用的方式是在 pretrained_modules.interaction 或命令行传入 interaction checkpoint。
    enabled: false
    use_refined_outputs: true
    hidden_dim: 256
    fast_layers: 3
    slow_layers: 3
    fast_kernel: 3
    slow_kernel: 9
    slow_dilation: 2
    slow_ma_window: 5
    dropout: 0.1
    object_code_dim: 128
    num_object_codes: 128
    prior_hidden_dim: 256
    prior_layers: 2
    prior_dropout: 0.1
    mesh_downsample_points: 256
    cond_mode_probs: [0.4, 0.4, 0.2]  # mesh/obs/null
    vq_commit_beta: 0.25
    refine_gt_epochs: 50
    gating_prior_beta: 5.0
    gating_temperature: 5.0
    gating_smoothing_enabled: false
    gating_smoothing_alpha: 0.6
    gating_max_change: 0.25
    vel_static_threshold: 0.3
    vel_min_hand_speed: 0.02

# ============ 训练超参数 ============
epoch: 300
batch_size: 80
lr: 0.0002
weight_decay: 0.00001
milestones: [100, 200]
gamma: 0.2
seed: 42
num_workers: 12

# ============ 特征维度 ============
num_human_imus: 6
imu_dim: 9
num_joints: 24
mesh_downsample_points: 256
object_geo_root: "datasets/OMOMO/captured_objects"

# ============ 噪声配置 ============
imu_noise_std: 0.3
obj_imu_noise_std: 0.3

# ============ 要使用的数据集 ============
train_datasets: ["omomo"]  # 可选: behave, imhd, omomo, amass

# ============ 数据集路径 ============
datasets:
  amass:
    train_path: "process/processed_amass_data_0703/train"
    test_path: "process/processed_amass_data_0703/test"
    debug_path: "process/processed_amass_data_0703/debug"
  omomo:
    train_path: "process/processed_split_data_OMOMO_bps/train"
    test_path: "process/processed_split_data_OMOMO_bps/test"
    debug_path: "process/processed_split_data_OMOMO_bps/debug"
  imhd:
    train_path: "process/processed_seg_data_IMHD/train"
    test_path: "process/processed_seg_data_IMHD/test"
    debug_path: "process/processed_seg_data_IMHD/debug"
  behave:
    train_path: "process/processed_seg_data_BEHAVE/train"
    test_path: "process/processed_seg_data_BEHAVE/test"
    debug_path: "process/processed_seg_data_BEHAVE/debug"

# ============ 损失权重 ============
loss_weights:
  # Stage 1: HumanPose
  vel_root: 1.0
  pose_reduced: 10.0
  root_vel_local: 1.0
  root_vel: 1.0
  root_trans: 0.5
  hand_pos: 1.0
  fk_joint: 1.0
  contact: 1.0
  smooth: 0.5
  pose_acc: 0.2
  root_acc: 1.0
  joint_acc: 0.2
  contact_smooth: 0.1

  # Stage 2: Interaction
  hand_vel: 1.0
  obj_vel: 1.0
  obj_move: 1.0
  hand_contact: 1.0
  foot_contact: 1.0
  obj_trans: 1.0
  lhand_obj_direction: 1.0
  rhand_obj_direction: 1.0
  lhand_lb: 1.0
  rhand_lb: 1.0
  obj_vel_cons: 0.5
  obj_acc_cons: 0.2
  refine_pose: 5.0
  refine_root_trans: 0.5
  refine_hand_pos: 2.0
  refine_fk_joint: 1.0
  align: 1.0
  commit: 0.1
  code_cls: 0.5
  obj_smooth: 0.3
  refine_smooth: 0.3

# ============ 窗口配置 ============
train:
  window: 120

test:
  window: 120

# ============ 预训练模块路径（可选）============
pretrained_modules:
  human_pose: "outputs/IMUHOI_Mamba/human_pose_mamba_04272154/best.pt"
  interaction: null
