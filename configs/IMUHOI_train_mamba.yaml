# IMUHOI Mamba human-pose training config
# 当前 Mamba 分支只实现 Stage 1 HumanPoseModule

# ============ 基本配置 ============
save_dir: "outputs/IMUHOI_Mamba"
body_model_path: datasets/smpl_models/smplh/male/model.npz
use_tensorboard: true
use_multi_gpu: true
device: "cuda:0"
gpus: [0]
model_arch: "mamba"

# ============ Mamba 模型超参数 ============
mamba:
  hidden_dim: 256
  part_hidden_dim: 256
  fast_layers: 3
  slow_layers: 3
  fast_kernel: 3
  slow_kernel: 9
  slow_dilation: 2
  slow_ma_window: 5
  memory_heads: 4
  memory_size: 8
  dropout: 0.1
  use_delta_features: false
  contact_fusion_enabled: true
  contact_fusion_min_prob: 0.5
  contact_fusion_full_prob: 0.9
  contact_fusion_max_speed: 5.0
  prevent_floor_penetration: true
  floor_height: 0.0

# ============ 训练超参数 ============
epoch: 300
batch_size: 80
lr: 0.0002
weight_decay: 0.00001
milestones: [100, 200]
gamma: 0.2
seed: 42
num_workers: 12

# ============ 特征维度 ============
num_human_imus: 6
imu_dim: 9
num_joints: 24

# ============ 噪声配置 ============
imu_noise_std: 0.3
obj_imu_noise_std: 0.3

# ============ 要使用的数据集 ============
train_datasets: ["omomo"]  # 可选: behave, imhd, omomo, amass

# ============ 数据集路径 ============
datasets:
  amass:
    train_path: "process/processed_amass_data_0703/train"
    test_path: "process/processed_amass_data_0703/test"
    debug_path: "process/processed_amass_data_0703/debug"
  omomo:
    train_path: "process/processed_split_data_OMOMO_bps/train"
    test_path: "process/processed_split_data_OMOMO_bps/test"
    debug_path: "process/processed_split_data_OMOMO_bps/debug"
  imhd:
    train_path: "process/processed_seg_data_IMHD/train"
    test_path: "process/processed_seg_data_IMHD/test"
    debug_path: "process/processed_seg_data_IMHD/debug"
  behave:
    train_path: "process/processed_seg_data_BEHAVE/train"
    test_path: "process/processed_seg_data_BEHAVE/test"
    debug_path: "process/processed_seg_data_BEHAVE/debug"

# ============ 损失权重 ============
loss_weights:
  vel_root: 1.0
  pose_reduced: 10.0
  root_vel_local: 1.0
  root_vel: 1.0
  root_trans: 1.0
  hand_pos: 1.0
  fk_joint: 1.0
  contact: 1.0
  smooth: 0.5

# ============ 窗口配置 ============
train:
  window: 120

test:
  window: 120

# ============ 预训练模块路径（可选）============
pretrained_modules:
  human_pose: "outputs/IMUHOI_Mamba/human_pose_mamba_04272154/best.pt"
