# IMUHOI 统一训练配置文件
# 通过命令行 --no_trans 参数切换模式

# ============ 基本配置 ============
save_dir: "outputs/IMUHOI_DiT"
body_model_path: datasets/smpl_models/smplh/male/model.npz
use_tensorboard: True
use_multi_gpu: True
device: "cuda:0"
gpus: [0]
model_arch: "dit"  # 可选: rnn, dit

# ============ DiT超参数(仅在model_arch=dit时使用) ============
dit:
  dit_d_model: 256
  dit_nhead: 8
  dit_num_layers: 6
  dit_dim_feedforward: 1024
  dit_dropout: 0.1
  dit_timesteps: 1000
  dit_use_time_embed: true
  dit_use_noise: true
  dit_prediction_type: "x0"
  dit_max_seq_len: 256
  dit_inference_steps: 20
  dit_inference_type: "sample_inpaint"  # sample_inpaint_x0 | sample_inpaint
  dit_inference_sampler: "ddim"  # recommended: ddim
  dit_inference_eta: 0.0  # recommended for AR stability; try 0.1 with diffusion mode for more stochasticity
  dit_test_use_gt_warmup: true
  dit_enable_root_correction: true
  dit_root_correction_contact_threshold: 0.5

# ============ 评估与EMA ============
ema_decay: 0.999
eval_ddim_steps: 10
eval_sampler: "ddim"
eval_eta: 0.0

# ============ 训练超参数 ============
epoch: 300
batch_size: 120
lr: 0.0002
weight_decay: 0.00001
milestones: [100, 200]
gamma: 0.2
seed: 42
num_workers: 12

# ============ 特征维度 ============
num_human_imus: 6
imu_dim: 9
num_joints: 24

# ============ 噪声配置 ============
imu_noise_std: 0.3
obj_imu_noise_std: 0.3

# ============ 要使用的数据集 ============
# 修改此项来选择训练数据
train_datasets: ["omomo"]  # 可选: behave, imhd, omomo, amass

# ============ 数据集路径 ============
datasets:
  amass:
    train_path: "process/processed_amass_data_0703/train"
    test_path: "process/processed_amass_data_0703/test"
    debug_path: "process/processed_amass_data_0703/debug"
  omomo:
    train_path: "process/processed_split_data_OMOMO/train"
    test_path: "process/processed_split_data_OMOMO/test"
    debug_path: "process/processed_split_data_OMOMO/debug"
  imhd:
    train_path: "process/processed_seg_data_IMHD/train"
    test_path: "process/processed_seg_data_IMHD/test"
    debug_path: "process/processed_seg_data_IMHD/debug"
  behave:
    train_path: "process/processed_seg_data_BEHAVE/train"
    test_path: "process/processed_seg_data_BEHAVE/test"
    debug_path: "process/processed_seg_data_BEHAVE/debug"

# ============ 损失权重 ============
loss_weights:
  # Stage 1: HumanPose
  simple_pose: 10.0
  vel_smooth: 0.5
  fk_joint: 1.0
  drift: 1
  foot_slide: 100
  diffusion_x0: 1.0
  
  # Stage 2: Interaction
  Loss_simple: 1.0
  Loss_drift_obj: 1.0
  Loss_jitter_obj: 1000

# ============ Test指标权重 ============
test_metric_weights:
  # Stage 1: HumanPose
  mpjre_mse: 1.0
  root_trans_err_mm: 1.0
  jitter_local_fk_mm: 1.0
  root_jitter_mm: 1.0

  # Stage 2: Interaction
  obj_pos_mse: 1.0
  obj_pos_jitter_mm: 1.0

# ============ 窗口配置 ============
train:
  window: 60

test:
  window: 60

# ============ 预训练模块路径（可选）============
# 取消注释以使用预训练权重
pretrained_modules:
  human_pose: "outputs/IMUHOI_DiT/human_pose_03202004/best.pt"
  interaction: "outputs/IMUHOI_DiT/interaction_03220349/best.pt"
